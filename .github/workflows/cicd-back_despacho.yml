name: CI/CD Innovatech - Backend Despachos

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "back-despachos/**"

jobs:
  build-push-deploy-despachos:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend Despachos y push a ECR
      run: |
        # Entramos a la carpeta específica de tu servicio
        cd back-despachos
        docker build -t backend-despachos .
        docker tag backend-despachos:latest ${{ secrets.ECR_REPO_URL_BACK_DESPACHO }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACK_DESPACHO }}:latest

    - name: Desplegar Backend Despachos vía SSM en EC2
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar backend-despachos desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest",
            "docker stop backend-despachos || true",
            "docker rm backend-despachos || true",
            "docker run -d --name backend-despachos -p 8081:8081 -e DB_ENDPOINT=${{ secrets.DB_HOST_IP }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e DB_PORT=3306 -e DB_NAME=despachos_db ${{ secrets.ECR_REPO_URL_DESPACHOS }}:latest"
          ]}' \
          --output text